name: Refresh Bots

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run HN bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_HN_EMAIL: ${{ secrets.BOT_HN_EMAIL }}
          BOT_HN_PASSWORD: ${{ secrets.BOT_HN_PASSWORD }}
        run: deno run -A bots/hn.ts

      - name: Run Lobsters bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_LOBSTERS_EMAIL: ${{ secrets.BOT_LOBSTERS_EMAIL }}
          BOT_LOBSTERS_PASSWORD: ${{ secrets.BOT_LOBSTERS_PASSWORD }}
        run: deno run -A bots/lobsters.ts

      # - name: Run arXiv bot
      #   env:
      #     DING_API_URL: ${{ secrets.DING_API_URL }}
      #     BOT_ARXIV_EMAIL: ${{ secrets.BOT_ARXIV_EMAIL }}
      #     BOT_ARXIV_PASSWORD: ${{ secrets.BOT_ARXIV_PASSWORD }}
      #   run: deno run -A bots/arxiv.ts

      - name: Run SmallWeb bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_SMALLWEB_EMAIL: ${{ secrets.BOT_SMALLWEB_EMAIL }}
          BOT_SMALLWEB_PASSWORD: ${{ secrets.BOT_SMALLWEB_PASSWORD }}
        run: deno run -A bots/smallweb.ts

      - name: Run Hmmm bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_HMMM_EMAIL: ${{ secrets.BOT_HMMM_EMAIL }}
          BOT_HMMM_PASSWORD: ${{ secrets.BOT_HMMM_PASSWORD }}
        run: deno run -A bots/hmmm.ts

      - name: Run Tildes bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_TILDES_EMAIL: ${{ secrets.BOT_TILDES_EMAIL }}
          BOT_TILDES_PASSWORD: ${{ secrets.BOT_TILDES_PASSWORD }}
        run: deno run -A bots/tildes.ts

      - name: Run 8ball bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_8BALL_EMAIL: ${{ secrets.BOT_8BALL_EMAIL }}
          BOT_8BALL_PASSWORD: ${{ secrets.BOT_8BALL_PASSWORD }}
        run: deno run -A bots/8ball.ts

      - name: Run Dice bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_DICE_EMAIL: ${{ secrets.BOT_DICE_EMAIL }}
          BOT_DICE_PASSWORD: ${{ secrets.BOT_DICE_PASSWORD }}
        run: deno run -A bots/dice.ts

      - name: Run CodeGolf bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_CODEGOLF_EMAIL: ${{ secrets.BOT_CODEGOLF_EMAIL }}
          BOT_CODEGOLF_PASSWORD: ${{ secrets.BOT_CODEGOLF_PASSWORD }}
        run: deno run -A bots/codegolf.ts

      - name: Run Estimation bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_ESTIMATION_EMAIL: ${{ secrets.BOT_ESTIMATION_EMAIL }}
          BOT_ESTIMATION_PASSWORD: ${{ secrets.BOT_ESTIMATION_PASSWORD }}
        run: deno run -A bots/estimation.ts

      - name: Run Remind bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_REMIND_EMAIL: ${{ secrets.BOT_REMIND_EMAIL }}
          BOT_REMIND_PASSWORD: ${{ secrets.BOT_REMIND_PASSWORD }}
        run: deno run -A bots/remind.ts

      - name: Run BestOf bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_BESTOF_EMAIL: ${{ secrets.BOT_BESTOF_EMAIL }}
          BOT_BESTOF_PASSWORD: ${{ secrets.BOT_BESTOF_PASSWORD }}
        run: deno run -A bots/bestof.ts
