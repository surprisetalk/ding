          BOT_CRITIC_EMAIL: ${{ secrets.BOT_CRITIC_EMAIL }}
          BOT_CRITIC_PASSWORD: ${{ secrets.BOT_CRITIC_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: deno run -A bots/critic.ts
