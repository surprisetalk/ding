name: Refresh Bots

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: refresh-bots
  cancel-in-progress: true

jobs:
  bots:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix:
        bot:
          - hn
          - lobsters
          - blogs
          - arxiv
          - smallweb
          - hmmm
          - tildes
          - ooh
          - youtube
          - 8ball
          - dice
          - codegolf
          - estimation
          - remind
          - bestof
          - haiku
          - pentameter
          - museum
          - album
          - mathgif
          - clipart
          - geometry
          - emojiglitch
          - lowpoly
          - pixelsort
          - dither
          - aquarium
          - stars
          - cowsay
          - sortinghat
          - summoner
          - kenm
          - bigfoot
          - caveman
          - critic
          - wizard
          - reader
          - tldr
          - upgoerfive
          - welcome
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run ${{ matrix.bot }} bot
        continue-on-error: true
        timeout-minutes: 2
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_EMAIL: ${{ secrets[format('BOT_{0}_EMAIL', matrix.bot)] }}
          BOT_PASSWORD: ${{ secrets[format('BOT_{0}_PASSWORD', matrix.bot)] }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          bot='${{ matrix.bot }}'
          upper=$(echo "$bot" | tr '[:lower:]' '[:upper:]')
          export "BOT_${upper}_EMAIL=$BOT_EMAIL"
          export "BOT_${upper}_PASSWORD=$BOT_PASSWORD"
          deno run -A "bots/${bot}.ts"
