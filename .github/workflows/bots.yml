          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: deno run -A bots/pixelsort.ts

      - name: Run Dither bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_DITHER_EMAIL: ${{ secrets.BOT_DITHER_EMAIL }}
          BOT_DITHER_PASSWORD: ${{ secrets.BOT_DITHER_PASSWORD }}
        run: deno run -A bots/dither.ts

      - name: Run Aquarium bot
        env:
          DING_API_URL: ${{ secrets.DING_API_URL }}
          BOT_AQUARIUM_EMAIL: ${{ secrets.BOT_AQUARIUM_EMAIL }}
          BOT_AQUARIUM_PASSWORD: ${{ secrets.BOT_AQUARIUM_PASSWORD }}
        run: deno run -A bots/aquarium.ts

      - name: Run Stars bot
        env:
